<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المعاملات | يلا تكرم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');

        :root {
            --bg: #0b0b0b;
            --surface: #161616;
            --accent: #d4af37;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --muted: #999;
            --success: #2ecc71;
            --fail: #e74c3c;
            --info: #3498db;
            --surface: #1f1f1f;
            --accent: #d4af37;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Open Sans', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* اللودر - Loader */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .loader-hidden { opacity: 0; visibility: hidden; }

        /* حالة الخطأ */
        #error-wrapper {
            display: fixed;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: 20px;
            margin-top: 50px;
        }

        .retry-btn {
            background-color: var(--accent);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            margin-top: 20px;
        }

        /* الجدول والكروت */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #1f1f1f; color: var(--accent); padding: 15px; text-align: right; border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover { background: #1d1d1d; }

        .id-txt { font-family: monospace; color: var(--muted); font-size: 0.8rem; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .status-success { background: rgba(46, 204, 113, 0.15); color: var(--success); }
        .status-fail { background: rgba(231, 76, 60, 0.15); color: var(--fail); }
        .status-approved { background: rgba(52, 152, 219, 0.15); color: var(--info); }

        /* الترقيم */
        .pagination { display: flex; justify-content: center; gap: 8px; padding: 20px; align-items: center; }
        .pg-btn { background: #1f1f1f; border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .pg-btn.active { background: var(--accent); color: black; border-color: var(--accent); }
        .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .hidden { display: none !important; }
    </style>
</head>

<body>

    <div id="loader-wrapper">
        <div class="loader"></div>
        <p>جاري تحميل البيانات...</p>
    </div>

    <div class="container">
        <div class="header">
            <h1 style="text-align: center; justify-content: space-between;color: #d4af37;border-radius: 20px; padding: 2px;"><i class="fas fa-exchange-alt"></i> سجل المعاملات المالية</h1>
            <p style="color: var(--muted); text-align: center;">عرض وإدارة حركات البطاقة الافتراضية</p>
        </div>

        <div id="error-wrapper" class="hidden">
            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #e74c3c; margin-bottom: 15px;"></i>
            <h3>عذراً، حدث خطأ ما!</h3>
            <p>حدث خطأ أثناء جلب البيانات، تأكد من اتصالك أو حاول لاحقاً.</p>
            <button style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;" class="retry-btn" onclick="location.reload()">إعادة المحاولة</button>
        </div>
        <div class="table-card hidden" id="main-content">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>المعرف</th>
                            <th>المبلغ</th>
                            <th>التفاصيل</th>
                            <th>نوع العملية</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination-controls"></div>
        </div>
    </div>
    <script>
        let allTransactions = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        const fetchURL = "https://144-172-107-161.sslip.io"
        async function fetchTransactions() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            const loader = document.getElementById('loader-wrapper');
            const content = document.getElementById('main-content');
            if (!userId) {
                loader.classList.add('loader-hidden');
                alert("معرف المستخدم مفقود!");
                return;
            }
            try {
                const response = await fetch(`${fetchURL}/transactions?user_id=${userId}`);
                const result = await response.json();
                if (result.success && result.data) {
                    allTransactions = result.data;
                    renderTable(1);
                    loader.classList.add('loader-hidden');
                    content.classList.remove('hidden');
                } else {
                    showError();
                }
            } catch (e) {
                console.error(e);
                showError();
            }
        }
        function renderTable(page) {
            currentPage = page;
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";

            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const currentItems = allTransactions.slice(start, end);

            currentItems.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td class="id-txt">${item.id}</td>
                        <td style="font-weight:bold; color: ${item.amount_full === '0.00' ? '#888' : 'var(--success)'}">
                            ${item.amount_full} USD
                        </td>
                        <td style="max-width:300px; font-size:0.8rem; color:#bbb">${item.narrative}</td>
                        <td>${item.amount_full === "0.00" ? "إجراء نظام" : "دفع"}</td>
                        <td><span class="badge status-${item.status}">${item.status.toUpperCase()}</span></td>
                        <td style="font-size:0.8rem">${item.created_at}</td>
                    </tr>
                `;
            });
            createPaginationControls();
        }
        function createPaginationControls() {
            const container = document.getElementById('pagination-controls');
            const totalPages = Math.ceil(allTransactions.length / rowsPerPage);
            container.innerHTML = "";
            if (totalPages <= 1) return;
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pg-btn';
            prevBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => renderTable(currentPage - 1);
            container.appendChild(prevBtn);
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `pg-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => renderTable(i);
                container.appendChild(btn);
            }   
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pg-btn';
            nextBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => renderTable(currentPage + 1);
            container.appendChild(nextBtn);
        }
        function showError() {
            document.getElementById("loader-wrapper").classList.add("loader-hidden");
            document.getElementById("main-content").classList.add("hidden");
            document.getElementById("error-wrapper").classList.remove("hidden");
        }
        window.onload = fetchTransactions;
    </script>
</body>
</html>
